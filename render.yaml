# render.yaml — Infrastructure-as-Code для Render.com
# Документация: https://render.com/docs/infrastructure-as-code
#
# Чтобы применить: Dashboard → New → Blueprint → укажи репозиторий.
# Или создай Web Service вручную с параметрами ниже.

databases:
  - name: stroik-db
    databaseName: stroik_db
    user: stroik
    plan: free
    region: frankfurt

services:
  - type: web
    name: stroik-api
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -e . && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    # autoDeploy: true — автодеплой при пуше в master
    autoDeploy: true
    envVars:
      # База данных — ссылка на сервис stroik-db выше
      - key: DATABASE_URL
        fromDatabase:
          name: stroik-db
          property: connectionString
      # Секретные переменные — укажи вручную через Render Dashboard
      - key: SECRET_KEY
        sync: false   # значение устанавливается вручную в Dashboard
      - key: GOOGLE_API_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: DEBUG
        value: "False"
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: https://stroik-site.vercel.app,http://localhost:3000
