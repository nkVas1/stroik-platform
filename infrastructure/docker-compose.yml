version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: stroik_postgres
    environment:
      POSTGRES_USER: stroik
      POSTGRES_PASSWORD: stroik_password
      POSTGRES_DB: stroik_db
    ports:
      - "5432:5432"
    volumes:
      - stroik_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stroik"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  stroik_pg_data:
