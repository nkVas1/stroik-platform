version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stroik-postgres
    environment:
      POSTGRES_USER: stroik
      POSTGRES_PASSWORD: stroik_dev_pass_2024
      POSTGRES_DB: stroik_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stroik"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
